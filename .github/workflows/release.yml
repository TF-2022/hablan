name: Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"

permissions:
  contents: write

jobs:
  version-and-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if release needed
        id: check
        run: |
          # Skip if last commit is a version bump (avoid infinite loop)
          LAST_MSG=$(git log -1 --pretty=%s)
          if [[ "$LAST_MSG" == release:* ]]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Skipping: last commit is a release bump"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.should_release == 'true'
        with:
          node-version: 22

      - name: Bump version and create tag
        if: steps.check.outputs.should_release == 'true'
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version patch -m "release: v%s" --no-git-tag-version)
          VERSION=${NEW_VERSION#v}
          git add package.json package-lock.json
          git commit -m "release: v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --tags
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

  build-windows:
    needs: version-and-tag
    if: needs.version-and-tag.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-and-tag.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate icons
        run: node scripts/generate-icons.mjs

      - name: Download whisper.cpp + ffmpeg
        run: node scripts/download-binaries.mjs

      - name: Build & Package
        run: npm run build && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: version-and-tag
    if: needs.version-and-tag.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-and-tag.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate icons
        run: node scripts/generate-icons.mjs

      - name: Build whisper.cpp (static) + download ffmpeg (static)
        run: |
          mkdir -p resources/bin/mac

          # whisper.cpp — build from source with static linking + Metal embedded
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git /tmp/whisper-build
          cd /tmp/whisper-build
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DGGML_METAL=ON \
            -DGGML_METAL_EMBED_LIBRARY=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DWHISPER_BUILD_EXAMPLES=ON \
            -DWHISPER_BUILD_SERVER=ON
          cmake --build build -j$(sysctl -n hw.ncpu) --config Release
          cp build/bin/whisper-cli $GITHUB_WORKSPACE/resources/bin/mac/whisper-cli
          cp build/bin/whisper-server $GITHUB_WORKSPACE/resources/bin/mac/whisper-server || true
          cd $GITHUB_WORKSPACE

          # ffmpeg — static build from eugeneware/ffmpeg-static (no .dylib deps)
          curl -L -o ffmpeg.gz "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffmpeg-darwin-arm64.gz"
          gunzip -f ffmpeg.gz
          mv ffmpeg resources/bin/mac/ffmpeg

          chmod +x resources/bin/mac/*

          # Ad-hoc sign each binary so they share a consistent signature inside the .app
          codesign --force --sign - resources/bin/mac/whisper-cli
          codesign --force --sign - resources/bin/mac/whisper-server 2>/dev/null || true
          codesign --force --sign - resources/bin/mac/ffmpeg

          echo "=== Binaries ==="
          ls -la resources/bin/mac/
          file resources/bin/mac/*
          echo "=== Dylib check ==="
          otool -L resources/bin/mac/ffmpeg || true
          otool -L resources/bin/mac/whisper-cli || true

      - name: Build & Package
        run: |
          npm run build
          npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  publish-release:
    needs: [version-and-tag, build-windows, build-macos]
    if: always() && needs.version-and-tag.outputs.should_release == 'true' && (needs.build-windows.result == 'success' || needs.build-macos.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish release
        run: |
          TAG="${{ needs.version-and-tag.outputs.tag }}"
          gh release edit "$TAG" --draft=false --latest 2>/dev/null \
            || gh release create "$TAG" --title "$TAG" --generate-notes --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
